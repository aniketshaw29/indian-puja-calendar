<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Puja Calendar{% endblock %}</title>

  <!-- Typography: Noto Serif Bengali for cultural gravitas, Inter for clean data -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- HTMX for seamless partial updates -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>

  <!-- Navigation header -->
  <header class="site-header">
    <div class="container">
      <a href="/?loc={{ current_loc_key|default('kolkata') }}" class="site-logo">
        <span class="logo-icon">&#x1F54A;</span>
        <span class="logo-text">Puja<br><small>Timelines</small></span>
      </a>
      <nav class="site-nav">
        <a href="/?loc={{ current_loc_key|default('kolkata') }}" class="nav-link"
           hx-get="/?loc={{ current_loc_key|default('kolkata') }}" hx-target="main" hx-swap="innerHTML">Today</a>
        <a href="/calendar?loc={{ current_loc_key|default('kolkata') }}" class="nav-link"
           hx-get="/calendar?loc={{ current_loc_key|default('kolkata') }}" hx-target="main" hx-swap="innerHTML">Calendar</a>
        <select class="loc-picker" onchange="var u=new URL(window.location);u.searchParams.set('loc',this.value);window.location.href=u.toString()">
          {% for loc_item in available_locations|default([]) %}
          <option value="{{ loc_item.key }}" {% if loc_item.key == current_loc_key|default('kolkata') %}selected{% endif %}>{{ loc_item.name }}</option>
          {% endfor %}
        </select>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>Based on drik-panchanga calculations &middot; Location: {{ current_loc_name|default('Kolkata') }}</p>
    </div>
  </footer>

</body>
</html>
